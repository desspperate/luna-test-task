name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_LINK_MODE: copy
  PYTHON_VERSION: "3.13"

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen --all-extras

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Pyright
        run: uv run pyright src tests

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen --all-extras

      - name: Run unit tests
        env:
          COVERAGE_FILE: .coverage.unit
        run: uv run pytest tests/unit -v --cov=src/payments_processor --cov-report=xml:coverage-unit.xml --cov-report=term

      - name: Upload coverage XML artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit.xml
          if-no-files-found: error

      - name: Upload raw coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-unit
          path: .coverage.unit
          if-no-files-found: error
          include-hidden-files: true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen --all-extras

      - name: Run integration tests
        env:
          COVERAGE_FILE: .coverage.integration
        run: uv run pytest tests/integration -v -m integration --cov=src/payments_processor --cov-report=xml:coverage-integration.xml --cov-report=term

      - name: Upload coverage XML artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration.xml
          if-no-files-found: error

      - name: Upload raw coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-integration
          path: .coverage.integration
          if-no-files-found: error
          include-hidden-files: true

  coverage-report:
    name: Combined Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen --all-extras

      - name: Download unit coverage data
        uses: actions/download-artifact@v4
        with:
          name: coverage-data-unit
          path: .

      - name: Download integration coverage data
        uses: actions/download-artifact@v4
        with:
          name: coverage-data-integration
          path: .

      - name: Combine coverage
        run: |
          uv run coverage combine .coverage.unit .coverage.integration
          uv run coverage report
          uv run coverage xml -o coverage-combined.xml

      - name: Upload combined coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-combined
          path: coverage-combined.xml
          if-no-files-found: error
